---
name: RSSHub
version: 2026.7.7
slug: rsshub
description: Generate a RSS/Atom/JSON feed from anything
url: https://github.com/cuihaijun/hassio-addons
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:newspaper-variant-multiple
panel_title: RSSHub
homeassistant: 2024.1.0
ports:
  1200/tcp: 1200
ports_description:
  1200/tcp: "Web Interface (HTTP or HTTPS when ssl is enabled)"
watchdog: "tcp://[HOST]:[PORT:1200]"
map:
  - config:rw
  - share:rw
  - ssl:rw
options:
  bind_address: "0.0.0.0:1200"
  certfile: fullchain.pem
  keyfile: privkey.pem
  ssl: false
  cache_type: memory
  cache_expire: 3600
  cache_content_expire: 3600
  disallow_robot: false
  enable_cache_manager: true
  request_retry: 3
  request_timeout: 30000
  logger_level: info
  # Platform API Keys (optional)
  github_access_token: ""
  twitter_username: ""
  twitter_password: ""
  twitter_auth_token: ""
  youtube_key: ""
  wechat_mp_cookie: ""
  weibo_cookies: ""
  bilibili_cookie: ""
schema:
  bind_address: str
  certfile: str
  keyfile: str
  ssl: bool
  cache_type: str
  cache_expire: int
  cache_content_expire: int
  disallow_robot: bool
  enable_cache_manager: bool
  request_retry: int
  request_timeout: int
  logger_level: list(emerg|alert|crit|error|warning|notice|info|debug)?
  # Platform API Keys (optional)
  github_access_token: str?
  twitter_username: str?
  twitter_password: str?
  twitter_auth_token: str?
  youtube_key: str?
  wechat_mp_cookie: str?
  weibo_cookies: str?
  bilibili_cookie: str?
